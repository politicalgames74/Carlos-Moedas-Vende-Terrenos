<!doctype html>
<html lang="pt">
<head>

<meta name="description" content="Corre para chegar primeiro aos 10 terrenos que o Carlos Moedas quer vender em Lisboa! A Câmara Municipal quer vender a investidores, enquanto que os Lisboetas querem Habitação a Preços Acessíveis."/>
<meta name="theme-color" content="#12101e"/>
<meta name="mobile-web-app-capable" content="yes"/>

<title>Lisboetas VS Carlos Moedas</title>
<style>
  :root{--sat:env(safe-area-inset-top);--sar:env(safe-area-inset-right);--sab:env(safe-area-inset-bottom);--sal:env(safe-area-inset-left);}
  html,body{margin:0;padding:0;height:100%;background:#0b1020;overflow:hidden;position:fixed;inset:0;
    font-family:'Trebuchet MS',Verdana,sans-serif;color:#fff;
    overscroll-behavior:none;-webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;touch-action:none;}
  #game{display:block;width:100vw;height:100vh;touch-action:none;background:#8fb98f;}
  #hint{position:fixed;left:8px;bottom:6px;font-size:12px;opacity:.55;pointer-events:none}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hint"></div>
<script>
(() => {
"use strict";
const cv = document.getElementById('game');
let ctx = cv.getContext('2d');       // aponta para o alvo de desenho corrente
const MCTX = ctx;                    // contexto real do ecrã
let W = 0, H = 0, DPR = 1;
let SAFE = {t:0,r:0,b:0,l:0};   // insets de safe-area (declarado antes do 1º resize)
// ---- passagem lo-fi (pixelização global, estilo HD-2D) ----
// A cena inteira é desenhada numa resolução virtual (~metade) e ampliada com
// nearest-neighbour: pixels nítidos e uniformes em todo o mundo, entidades e
// cutscenes. O HUD e o texto desenham-se depois, à resolução total (crisp()).
const LOFI = document.createElement('canvas');
const LCTX = LOFI.getContext('2d');
let PIXD = 2;                        // divisor da resolução virtual
let inLofi = false; const crispQ = [];
function crisp(fn){ if(inLofi) crispQ.push(fn); else fn(); }
function lofiBegin(){
  inLofi = true; ctx = LCTX;
  ctx.setTransform(1/PIXD,0,0,1/PIXD,0,0);
  ctx.clearRect(0,0,W,H);
}
function lofiEnd(){
  inLofi = false; ctx = MCTX;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(LOFI, 0,0,LOFI.width,LOFI.height, 0,0,W,H);
  ctx.imageSmoothingEnabled = true;
  for(const fn of crispQ) fn();
  crispQ.length = 0;
}
function resize(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  W = window.innerWidth || document.documentElement.clientWidth || 1280;
  H = window.innerHeight || document.documentElement.clientHeight || 720;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  MCTX.setTransform(DPR,0,0,DPR,0,0);
  PIXD = W>=1000 ? 2 : 1.5;          // ecrãs pequenos: grelha mais fina p/ legibilidade
  LOFI.width  = Math.ceil(W/PIXD);
  LOFI.height = Math.ceil(H/PIXD);
  if(typeof readSafe==='function') readSafe();
}
window.addEventListener('resize', resize);
window.addEventListener('load', resize);
resize();

// ---------- input ----------
const keys = {};
const mouse = {x:0,y:0,clicked:false};
let IS_TOUCH = (navigator.maxTouchPoints>0) || ('ontouchstart' in window);
const touchDir = {u:false,d:false,l:false,r:false};   // direção do joystick tátil
const joy = {active:false,id:null,cx:0,cy:0,dx:0,dy:0};
function readSafe(){
  const cs=getComputedStyle(document.documentElement);
  const px=v=>parseFloat(cs.getPropertyValue(v))||0;
  SAFE={t:px('--sat'),r:px('--sar'),b:px('--sab'),l:px('--sal')};
}
readSafe();
{ const h=document.getElementById('hint'); if(h) h.textContent = IS_TOUCH ? '' : 'Setas para mover • ESC menu'; }
function joyRadius(){ return Math.max(46, Math.min(W,H)*0.12); }
// O joystick vive nos dois cantos de baixo (serve destros e canhotos) para
// não tapar o meio do ecrã, que é por onde se joga.
function joyZone(x,y){
  const R=joyRadius();
  const zw=Math.max(R*2.4, W*0.32), zh=Math.max(R*2.4, H*0.46);
  if(y < H-zh) return null;
  return x < zw ? 'l' : (x > W-zw ? 'r' : null);
}
function joyHome(side){
  const R=joyRadius(), m=R*0.95+10;
  return { x: side==='l' ? SAFE.l+m : W-SAFE.r-m, y: H-SAFE.b-m-6 };
}
function pauseBtnRect(){ const s=Math.max(40, Math.min(W,H)*0.072); return {x:W-SAFE.r-s-12, y:SAFE.t+hudHeight()+6, w:s, h:s}; }
function inPauseBtn(x,y){ if(!IS_TOUCH) return false; const b=pauseBtnRect(); return x>b.x&&x<b.x+b.w&&y>b.y&&y<b.y+b.h; }
function updateTouchDir(){
  // Zona morta pequena: só o suficiente para o tremor do dedo não trocar de
  // direção sozinho. Antes eram 30% do raio, o que obrigava a um arrasto
  // deliberado antes de o jogo reagir.
  const th=Math.max(5, joyRadius()*0.10);
  touchDir.l=joy.active && joy.dx<-th; touchDir.r=joy.active && joy.dx>th;
  touchDir.u=joy.active && joy.dy<-th; touchDir.d=joy.active && joy.dy>th;
}
function clearJoy(){ joy.active=false; joy.id=null; touchDir.u=touchDir.d=touchDir.l=touchDir.r=false; }

// evitar scroll/pinch-zoom/duplo-toque (iOS Safari / Android)
document.addEventListener('touchmove', e=>{ if(e.cancelable) e.preventDefault(); }, {passive:false});
document.addEventListener('gesturestart', e=>e.preventDefault());
let _lastTap=0;
document.addEventListener('touchend', e=>{ const n=Date.now(); if(n-_lastTap<320) e.preventDefault(); _lastTap=n; }, {passive:false});

window.addEventListener('keydown', e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys[e.key]=true;
  if(e.key==='Escape'){
    if(state==='play'||state==='countdown'){ pausePrev=state; state='pause'; }
    else if(state==='pause'){ state=pausePrev||'play'; }
  }
});
window.addEventListener('keyup', e=>{ keys[e.key]=false; });
cv.addEventListener('pointerdown', e=>{
  const r=cv.getBoundingClientRect();
  const x=e.clientX-r.left, y=e.clientY-r.top;
  mouse.x=x; mouse.y=y;
  if((state==='play'||state==='countdown') && inPauseBtn(x,y)){ mouse.clicked=true; return; }
  if(IS_TOUCH && state==='play' && !joy.active){   // só nos cantos de baixo
    const z=joyZone(x,y);
    if(z){
      // Centro fixo na marca do canto, não onde o polegar caiu: assim o
      // próprio toque já vale deflexão e o jogo arranca no instante, em vez
      // de esperar por um arrasto. Também condiz com o anel que está lá
      // desenhado enquanto o joystick está parado.
      const R=joyRadius(), h=joyHome(z);
      joy.active=true; joy.id=e.pointerId; joy.cx=h.x; joy.cy=h.y;
      let dx=x-h.x, dy=y-h.y; const d=Math.hypot(dx,dy);
      if(d>R){ dx=dx/d*R; dy=dy/d*R; }
      joy.dx=dx; joy.dy=dy; updateTouchDir(); return;
    }
  }
  mouse.clicked=true;
});
cv.addEventListener('pointermove', e=>{
  const r=cv.getBoundingClientRect();
  const x=e.clientX-r.left, y=e.clientY-r.top;
  mouse.x=x; mouse.y=y;
  if(joy.active && e.pointerId===joy.id){
    let dx=x-joy.cx, dy=y-joy.cy; const R=joyRadius(), d=Math.hypot(dx,dy);
    if(d>R){ dx=dx/d*R; dy=dy/d*R; }
    joy.dx=dx; joy.dy=dy; updateTouchDir();
  }
});
function onPointerUp(e){ if(joy.active && e.pointerId===joy.id) clearJoy(); }
cv.addEventListener('pointerup', onPointerUp);
cv.addEventListener('pointercancel', onPointerUp);
window.addEventListener('blur', clearJoy);

// ---------- util ----------
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
const TAU=Math.PI*2;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function rr(g,x,y,w,h,r){ r=Math.min(r,w/2,h/2); g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }

// ---------- world layout ----------
const RIVER_W = 150;
const STREET = 74;
const CELL_W = 190;
const COLS = 4;
const ROW_H = CELL_W + STREET;
const CELL_H = CELL_W;
const WORLD_W = RIVER_W + STREET + COLS*(CELL_W+STREET);
const PLAYER_R = 17;
const S = CELL_W; // tile canvas size
function colX(c){ return RIVER_W + STREET + c*(CELL_W+STREET); }
function cellRect(row,col){ return {x:colX(col), y:row*ROW_H+STREET, w:CELL_W, h:CELL_H}; }
const LANDMARKS = ['pombal','luz','rossio','aqueduto','amoreiras','estrela','castelo','belem','alvalade'];
const TOTAL_PLOTS = 10;

// ---------- sprite helpers ----------
const OUT='#221c16';
function mkCanvas(w,h,fn){
  const c=document.createElement('canvas'); c.width=w*2; c.height=h*2;
  const g=c.getContext('2d'); g.scale(2,2); g.lineJoin='round'; g.lineCap='round';
  fn(g); return c;
}
// sidewalk + curb base shared by all tiles
function tileBase(g){
  g.fillStyle='#cfc6ae'; rr(g,0,0,S,S,10); g.fill();
  // calçada dot texture on border
  g.fillStyle='rgba(255,255,255,.4)';
  for(let i=6;i<S;i+=11){
    g.fillRect(i,3,3,3); g.fillRect(i,S-6,3,3);
    g.fillRect(3,i,3,3); g.fillRect(S-6,i,3,3);
  }
  g.fillStyle='rgba(90,85,70,.35)';
  for(let i=11;i<S;i+=11){
    g.fillRect(i,7,2,2); g.fillRect(i,S-9,2,2);
    g.fillRect(7,i,2,2); g.fillRect(S-9,i,2,2);
  }
  g.strokeStyle='rgba(90,85,70,.6)'; g.lineWidth=1.5; rr(g,1,1,S-2,S-2,10); g.stroke();
}
function tileShadow(g,x,y,w,h,r){
  g.fillStyle='rgba(20,20,30,.28)'; rr(g,x+5,y+6,w,h,r); g.fill();
}
function label(g,txt,y){
  g.font='bold 11px Trebuchet MS'; g.textAlign='center';
  const w=g.measureText(txt).width+12;
  g.fillStyle='rgba(20,22,34,.82)'; rr(g,S/2-w/2,y-11,w,15,4); g.fill();
  g.strokeStyle='rgba(240,220,160,.6)'; g.lineWidth=1; rr(g,S/2-w/2,y-11,w,15,4); g.stroke();
  g.fillStyle='#f4ecd7'; g.fillText(txt,S/2,y);
}
// ---- vista em ângulo ligeiro: tiles com fachada sul ----
const EXT=40; // padding inferior dos tiles para fachadas
function mkTile(fn){ return mkCanvas(S,S+EXT,fn); }
// banda de fachada com janelas, porta e oclusão ambiente
function wallBand(g,x,w,yTop,h,col,azulejo){
  g.fillStyle=col; g.fillRect(x,yTop,w,h);
  if(azulejo){
    // fachada de azulejos: grelha de mini-quadrados em dois azuis sobre junta branca
    g.fillStyle='#eef2f6'; g.fillRect(x,yTop,w,h);
    for(let xx=x;xx<x+w-3;xx+=6){ for(let yy=yTop;yy<yTop+h-3;yy+=6){
      g.fillStyle= (((xx+yy)/6)|0)%2? '#3f6fae':'#7fa8d4';
      g.fillRect(xx+1,yy+1,4.2,4.2);
    } }
  }
  const sh=g.createLinearGradient(0,yTop,0,yTop+h);
  sh.addColorStop(0,'rgba(0,0,0,.05)'); sh.addColorStop(1,'rgba(0,0,0,.42)');
  g.fillStyle=sh; g.fillRect(x,yTop,w,h);
  g.fillStyle='rgba(0,0,0,.35)'; g.fillRect(x,yTop,w,3);
  const cols=Math.max(3,Math.floor(w/26)), winW=9, winH=Math.min(13,h*0.42);
  for(let c=0;c<cols;c++){
    const wx=x+10+c*(w-20-winW)/(cols-1), wy=yTop+6;
    g.fillStyle='#2c2a30'; g.fillRect(wx,wy,winW,winH);
    g.strokeStyle='rgba(244,238,224,.85)'; g.lineWidth=1; g.strokeRect(wx-0.5,wy-0.5,winW+1,winH+1);
    g.fillStyle='rgba(150,190,220,.30)'; g.fillRect(wx,wy,winW,winH*0.45);
  }
  if(h>=24){ const dx=x+w/2-7;
    g.fillStyle='#3a2c20'; g.fillRect(dx,yTop+h-15,14,15);
    g.strokeStyle='rgba(0,0,0,.4)'; g.lineWidth=1; g.strokeRect(dx,yTop+h-15,14,15); }
}
// silhueta extrudida: parede escura por baixo do volume
function extrudeSil(g,ex,col,pathFn){
  g.save(); g.translate(0,ex);
  pathFn(g); g.fillStyle=col; g.fill();
  pathFn(g); g.clip();
  const sh=g.createLinearGradient(0,0,0,S+ex);
  sh.addColorStop(0.5,'rgba(0,0,0,.06)'); sh.addColorStop(1,'rgba(0,0,0,.45)');
  g.fillStyle=sh; g.fillRect(0,-ex,S,S+ex*2);
  g.restore();
}
// ===== retrato realista (220x300) =====
function paintPortraitR(g,mood){
  const RND=mulberry32(42);
  // ---- fato ----
  const suit=g.createLinearGradient(40,160,180,300);
  suit.addColorStop(0,'#33538a'); suit.addColorStop(0.5,'#24406e'); suit.addColorStop(1,'#12233f');
  g.beginPath();
  g.moveTo(14,300); g.lineTo(17,226); g.quadraticCurveTo(21,184,62,170); g.lineTo(88,161);
  g.lineTo(132,161); g.lineTo(158,170); g.quadraticCurveTo(199,184,203,226); g.lineTo(206,300);
  g.closePath(); g.fillStyle=suit; g.fill();
  g.lineWidth=2.5; g.strokeStyle='#0d1626'; g.stroke();
  g.strokeStyle='rgba(255,255,255,.14)'; g.lineWidth=5;
  g.beginPath(); g.moveTo(24,214); g.quadraticCurveTo(30,186,64,173); g.stroke();
  g.beginPath(); g.moveTo(196,214); g.quadraticCurveTo(190,186,156,173); g.stroke();
  g.strokeStyle='rgba(0,0,0,.25)'; g.lineWidth=2;
  g.beginPath(); g.moveTo(30,238); g.quadraticCurveTo(42,244,44,262); g.stroke();
  g.beginPath(); g.moveTo(190,238); g.quadraticCurveTo(178,244,176,262); g.stroke();
  // camisa
  const shg=g.createLinearGradient(0,164,0,246); shg.addColorStop(0,'#ffffff'); shg.addColorStop(1,'#ddd6c6');
  g.beginPath(); g.moveTo(84,164); g.lineTo(110,242); g.lineTo(136,164); g.closePath();
  g.fillStyle=shg; g.fill();
  g.strokeStyle='rgba(120,110,90,.5)'; g.lineWidth=1.5; g.stroke();
  g.strokeStyle='rgba(120,110,90,.35)'; g.beginPath(); g.moveTo(110,176); g.lineTo(110,238); g.stroke();
  g.fillStyle='rgba(120,110,90,.5)';
  for(let i=0;i<4;i++){ g.beginPath(); g.arc(110,186+i*14,1.2,0,TAU); g.fill(); }
  // colarinho
  g.fillStyle='#fff'; g.strokeStyle='#c2baa6'; g.lineWidth=1.5;
  g.beginPath(); g.moveTo(88,159); g.lineTo(107,166); g.lineTo(93,187); g.lineTo(81,170); g.closePath(); g.fill(); g.stroke();
  g.beginPath(); g.moveTo(132,159); g.lineTo(113,166); g.lineTo(127,187); g.lineTo(139,170); g.closePath(); g.fill(); g.stroke();
  g.fillStyle='rgba(0,0,0,.12)';
  g.beginPath(); g.moveTo(90,162); g.lineTo(104,167); g.lineTo(95,180); g.closePath(); g.fill();
  // lapelas
  const lap=g.createLinearGradient(0,164,0,232); lap.addColorStop(0,'#22375c'); lap.addColorStop(1,'#15263f');
  g.fillStyle=lap; g.strokeStyle='#0d1626'; g.lineWidth=2;
  g.beginPath(); g.moveTo(84,164); g.lineTo(100,174); g.lineTo(97,230); g.lineTo(71,211); g.closePath(); g.fill(); g.stroke();
  g.beginPath(); g.moveTo(136,164); g.lineTo(120,174); g.lineTo(123,230); g.lineTo(149,211); g.closePath(); g.fill(); g.stroke();
  g.strokeStyle='rgba(255,255,255,.18)'; g.lineWidth=1.5;
  g.beginPath(); g.moveTo(85,167); g.lineTo(98,175); g.stroke();
  g.beginPath(); g.moveTo(135,167); g.lineTo(122,175); g.stroke();
  g.fillStyle='#d1332e'; g.fillRect(82,193,9,4);
  // mãos entrelaçadas
  const hnd=g.createLinearGradient(0,252,0,280); hnd.addColorStop(0,'#f0c8a0'); hnd.addColorStop(1,'#cf9c6e');
  g.fillStyle=hnd; g.strokeStyle='#a5764e'; g.lineWidth=1.8;
  g.beginPath(); g.ellipse(101,266,15,11,0.3,0,TAU); g.fill(); g.stroke();
  g.beginPath(); g.ellipse(120,266,15,11,-0.3,0,TAU); g.fill(); g.stroke();
  g.strokeStyle='rgba(160,110,70,.7)'; g.lineWidth=1.4;
  for(let i=0;i<4;i++){ g.beginPath(); g.moveTo(103+i*5,256); g.quadraticCurveTo(101+i*5,264,102+i*5,271); g.stroke(); }
  g.strokeStyle='rgba(160,110,70,.5)';
  g.beginPath(); g.ellipse(96,262,4.5,7,0.5,0,TAU); g.stroke();
  g.strokeStyle='#f4f1e8'; g.lineWidth=4.5;
  g.beginPath(); g.moveTo(83,260); g.lineTo(91,267); g.stroke();
  g.beginPath(); g.moveTo(137,260); g.lineTo(129,267); g.stroke();
  // ---- pescoço ----
  const nk=g.createLinearGradient(0,128,0,168); nk.addColorStop(0,'#caa27a'); nk.addColorStop(1,'#e5b98d');
  g.fillStyle=nk;
  g.beginPath(); g.moveTo(95,128); g.lineTo(95,164); g.quadraticCurveTo(110,172,125,164); g.lineTo(125,128); g.closePath(); g.fill();
  g.strokeStyle='rgba(150,100,60,.35)'; g.lineWidth=1.5;
  g.beginPath(); g.moveTo(103,140); g.lineTo(104,160); g.stroke();
  // ---- cabeça ----
  const skin=g.createRadialGradient(100,80,18,110,100,74);
  skin.addColorStop(0,'#f3d3b0'); skin.addColorStop(0.65,'#e9c1a0'); skin.addColorStop(1,'#cf9c74');
  g.beginPath(); g.ellipse(110,96,42,50,0,0,TAU); g.fillStyle=skin; g.fill();
  g.lineWidth=1.5; g.strokeStyle='rgba(140,95,58,.4)'; g.stroke();
  g.save(); g.beginPath(); g.ellipse(110,96,42,50,0,0,TAU); g.clip();
  g.fillStyle='rgba(150,90,50,.16)'; g.beginPath(); g.ellipse(140,100,20,44,0.15,0,TAU); g.fill();
  g.fillStyle='rgba(150,90,50,.10)'; g.beginPath(); g.ellipse(78,102,14,38,-0.1,0,TAU); g.fill();
  g.fillStyle='rgba(255,240,215,.35)'; g.beginPath(); g.ellipse(100,66,26,16,0,0,TAU); g.fill();
  g.fillStyle='rgba(215,120,90,.13)';
  g.beginPath(); g.ellipse(84,112,10,7,0.2,0,TAU); g.fill();
  g.beginPath(); g.ellipse(136,112,10,7,-0.2,0,TAU); g.fill();
  // modelação do maxilar e queixo (mais realista)
  g.fillStyle='rgba(140,85,50,.12)';
  g.beginPath(); g.ellipse(110,138,26,12,0,0,TAU); g.fill();
  g.strokeStyle='rgba(140,85,50,.25)'; g.lineWidth=2;
  g.beginPath(); g.arc(110,118,30,0.55,2.59); g.stroke();
  // covinha do queixo + filtro labial
  g.strokeStyle='rgba(140,85,50,.3)'; g.lineWidth=1.5;
  g.beginPath(); g.moveTo(110,117); g.lineTo(110,121); g.stroke();
  g.beginPath(); g.arc(110,150,5,3.5,5.9); g.stroke();
  // têmporas encovadas
  g.fillStyle='rgba(150,90,50,.08)';
  g.beginPath(); g.ellipse(76,84,8,14,0.2,0,TAU); g.fill();
  g.beginPath(); g.ellipse(144,84,8,14,-0.2,0,TAU); g.fill();
  g.restore();
  // orelhas
  g.fillStyle='#eabf95'; g.strokeStyle='rgba(150,100,60,.55)'; g.lineWidth=1.8;
  g.beginPath(); g.ellipse(67,100,7.5,13,0.05,0,TAU); g.fill(); g.stroke();
  g.beginPath(); g.ellipse(153,100,7.5,13,-0.05,0,TAU); g.fill(); g.stroke();
  g.strokeStyle='rgba(150,100,60,.5)'; g.lineWidth=1.3;
  g.beginPath(); g.arc(67,99,4,-1.2,1.6); g.stroke();

function paintLisbonFlag(g,w,h){
  const cx=w/2, cy=h/2;
  const pts=[[0,0],[cx,0],[w,0],[w,cy],[w,h],[cx,h],[0,h],[0,cy]];
  for(let i=0;i<8;i++){
    const a=pts[i], b=pts[(i+1)%8];
    g.beginPath(); g.moveTo(cx,cy); g.lineTo(a[0],a[1]); g.lineTo(b[0],b[1]); g.closePath();
    g.fillStyle= i%2? '#181818':'#f4f2ec'; g.fill();
  }
  g.strokeStyle='rgba(0,0,0,.4)'; g.lineWidth=1.5; g.strokeRect(0.75,0.75,w-1.5,h-1.5);
  // escudo (grande e bold para ler a esta escala)
  const sw2=w*0.42, sh2=h*0.70, sx2=cx-sw2/2, sy2=cy-sh2/2;
  g.beginPath(); g.moveTo(sx2,sy2); g.lineTo(sx2+sw2,sy2); g.lineTo(sx2+sw2,sy2+sh2*0.60);
  g.quadraticCurveTo(sx2+sw2,sy2+sh2,cx,sy2+sh2);
  g.quadraticCurveTo(sx2,sy2+sh2,sx2,sy2+sh2*0.60); g.closePath();
  g.fillStyle='#f7f5ef'; g.fill();
  g.strokeStyle='#c9a227'; g.lineWidth=3.5; g.stroke();
  g.save(); g.clip();
  // mar
  g.fillStyle='#2e6fae'; g.fillRect(sx2,sy2+sh2*0.70,sw2,sh2*0.30);
  g.strokeStyle='#7fb3dd'; g.lineWidth=2;
  for(let r=0;r<2;r++){ g.beginPath();
    for(let x=sx2;x<=sx2+sw2;x+=4){ const y=sy2+sh2*0.74+r*6+Math.sin(x*0.35+r*2)*1.8;
      x===sx2?g.moveTo(x,y):g.lineTo(x,y); } g.stroke(); }
  // nau dourada (casco grosso)
  g.fillStyle='#e0b224'; g.strokeStyle='#8a5a10'; g.lineWidth=2;
  g.beginPath(); g.moveTo(cx-sw2*0.40,sy2+sh2*0.50);
  g.quadraticCurveTo(cx,sy2+sh2*0.86,cx+sw2*0.40,sy2+sh2*0.50);
  g.lineTo(cx+sw2*0.33,sy2+sh2*0.44);
  g.quadraticCurveTo(cx,sy2+sh2*0.70,cx-sw2*0.33,sy2+sh2*0.44);
  g.closePath(); g.fill(); g.stroke();
  // castelos de proa/popa
  g.fillStyle='#e0b224';
  g.fillRect(cx-sw2*0.36,sy2+sh2*0.38,sw2*0.10,sh2*0.10);
  g.fillRect(cx+sw2*0.26,sy2+sh2*0.38,sw2*0.10,sh2*0.10);
  g.strokeRect(cx-sw2*0.36,sy2+sh2*0.38,sw2*0.10,sh2*0.10);
  g.strokeRect(cx+sw2*0.26,sy2+sh2*0.38,sw2*0.10,sh2*0.10);
  // mastro + verga + vela ferrada
  g.strokeStyle='#8a5a10'; g.lineWidth=3;
  g.beginPath(); g.moveTo(cx,sy2+sh2*0.46); g.lineTo(cx,sy2+sh2*0.10); g.stroke();
  g.beginPath(); g.moveTo(cx-sw2*0.16,sy2+sh2*0.18); g.lineTo(cx+sw2*0.16,sy2+sh2*0.18); g.stroke();
  g.fillStyle='#efe3c2'; rr(g,cx-sw2*0.14,sy2+sh2*0.18,sw2*0.28,sh2*0.07,3); g.fill();
  g.strokeStyle='#b89a5c'; g.lineWidth=1; rr(g,cx-sw2*0.14,sy2+sh2*0.18,sw2*0.28,sh2*0.07,3); g.stroke();
  // dois corvos (grandes e sólidos)
  g.fillStyle='#141414';
  for(const d of [-1,1]){
    const bx3=cx+d*sw2*0.24, by3=sy2+sh2*0.35;
    g.beginPath(); g.ellipse(bx3,by3,6.5,4.5,d*0.12,0,TAU); g.fill();          // corpo
    g.beginPath(); g.arc(bx3+d*5.5,by3-4,3,0,TAU); g.fill();                    // cabeça
    g.beginPath(); g.moveTo(bx3+d*8.2,by3-4.6); g.lineTo(bx3+d*12,by3-3.4); g.lineTo(bx3+d*8,by3-2.6); g.closePath(); g.fill(); // bico
    g.beginPath(); g.moveTo(bx3-d*5,by3-1); g.lineTo(bx3-d*12.5,by3+1.6); g.lineTo(bx3-d*5,by3+3); g.closePath(); g.fill();     // cauda
    g.strokeStyle='#141414'; g.lineWidth=1.6;
    g.beginPath(); g.moveTo(bx3-d*1,by3+4.4); g.lineTo(bx3-d*1,by3+7.5); g.stroke(); // pata
  }
  g.restore();
}

// ================= WORLD GEN =================
let cells, plots, lastRowGen;
let plotsPlaced=0, rowsSinceGas=999, rowsSinceGira=999, giraCount=0;
let plotRows=new Set(), landmarkAt=new Map();
const PLOT_SPACING=4, FIRST_PLOT_ROW=5;   // terrenos bem afastados
const MAX_ROW = FIRST_PLOT_ROW + (TOTAL_PLOTS-1)*PLOT_SPACING + 6;  // mundo finito (último terreno + folga)
const WORLD_TOP_Y = (MAX_ROW+1)*ROW_H;    // parede invisível no topo
function planWorld(){
  plotRows=new Set(); landmarkAt=new Map();
  for(let i=0;i<TOTAL_PLOTS;i++) plotRows.add(FIRST_PLOT_ROW+i*PLOT_SPACING);
  const lastPlotRow=FIRST_PLOT_ROW+(TOTAL_PLOTS-1)*PLOT_SPACING;
  // todos os landmarks, distribuídos uniformemente (evitando as filas de terreno)
  for(let i=0;i<LANDMARKS.length;i++){
    let r=3+Math.round(i*(lastPlotRow-4)/(LANDMARKS.length-1));
    while(plotRows.has(r)||landmarkAt.has(r)) r++;
    landmarkAt.set(r, LANDMARKS[i]);
  }
}
function genReset(){
  cells = new Map(); plots = [];
  lastRowGen = -1;
  plotsPlaced=0; rowsSinceGas=999; rowsSinceGira=999; giraCount=0;
  planWorld();
  // O mundo é finito e pequeno (~190 células): gera-se todo de uma vez. Assim
  // os 10 terrenos existem sempre e o fim da partida não depende de o jogador
  // ou o computador chegarem lá para os fazer nascer.
  ensureRows(MAX_ROW);
}
function resolveAbandonedPlot(p){   // terreno que ficou por reclamar → fica para o adversário do jogador
  const oppSide = playerSide==='moedas' ? 'lisboetas' : 'moedas';
  p.claimedBy = oppSide;
  plotsDone++;
  if(oppSide==='moedas'){ p.buildType = Math.random()<0.5?'condo':'hotel'; plotsSold++;
    if(p.buildType==='condo') condosBuilt++; else hotelsBuilt++; }
  else plotsSaved++;
  if(plotsDone>=TOTAL_PLOTS && state==='play') playCut('end',999);
}
function ensureRows(uptoRow){
  if(uptoRow>MAX_ROW) uptoRow=MAX_ROW;    // mundo finito: não gerar para lá do topo
  while(lastRowGen < uptoRow){ lastRowGen++; genRow(lastRowGen); }
}
function genRow(row){
  if(row<2) return;
  const R = mulberry32(99991 + row*7);
  rowsSinceGas++; rowsSinceGira++;
  const isPlotRow=plotRows.has(row);
  const lmName=landmarkAt.get(row);
  const plotCol = isPlotRow ? (R()<0.5?1:2) : -1;
  let lmCol=-1;
  if(lmName){
    lmCol = (lmName==='belem') ? 0 : (1+(R()*3|0));   // Belém junto ao rio; restantes cols 1-3
    if(lmCol===plotCol) lmCol=(lmCol%3)+1;
  }
  let gasDone=false, giraDone=false;
  for(let c=0;c<COLS;c++){
    const key=row+','+c;
    const rc=cellRect(row,c);
    const cx=rc.x+rc.w/2, cy=rc.y+rc.h/2;
    let feat=null;
    if(c===plotCol){
      feat={type:'plot', row, col:c, x:cx, y:cy, w:rc.w, h:rc.h, claimedBy:null, num:plotsPlaced+1};
      plots.push(feat); plotsPlaced++;
    } else if(lmName && c===lmCol){
      feat={type:'landmark', name:lmName, x:cx, y:cy, w:rc.w, h:rc.h};
    } else {
      const r=R();
      if(!gasDone && rowsSinceGas>=4 && r<0.09){
        feat={type:'gas', x:cx, y:cy, w:rc.w, h:rc.h}; rowsSinceGas=0; gasDone=true;
      } else if(!giraDone && rowsSinceGira>=2 && r<0.16){
        const broken=(giraCount++ % 3)!==2;   // padrão má-má-boa → 2/3 avariadas, 1/3 boas
        feat={type:'gira', x:cx, y:cy, w:rc.w, h:rc.h, broken, used:false}; rowsSinceGira=0; giraDone=true;
      } else if(r<0.32){
        feat={type:'garden', x:cx, y:cy, w:rc.w, h:rc.h};
      } else {
        feat={type:'building', x:cx, y:cy, w:rc.w, h:rc.h, seed:(R()*1000|0)};
      }
    }
    cells.set(key, feat);
  }
}
const OPEN_LM={pombal:1,rossio:1};   // praças atravessáveis
function isSolid(feat){ return feat && (feat.type==='building' || (feat.type==='landmark' && !OPEN_LM[feat.name])); }

function collideSlide(ent){
  ent.x = clamp(ent.x, RIVER_W+PLAYER_R+4, WORLD_W-PLAYER_R-4);
  ent.y = clamp(ent.y, 20, WORLD_TOP_Y);
  const row0=Math.floor((ent.y-CELL_H)/ROW_H)-1;
  for(let row=row0; row<=row0+3; row++){
    if(row<0) continue;
    for(let c=0;c<COLS;c++){
      const f=cells.get(row+','+c);
      if(!isSolid(f)) continue;
      const nx=clamp(ent.x, f.x-f.w/2, f.x+f.w/2);
      const ny=clamp(ent.y, f.y-f.h/2, f.y+f.h/2);
      const dx=ent.x-nx, dy=ent.y-ny;
      const d2=dx*dx+dy*dy;
      if(d2 < PLAYER_R*PLAYER_R){
        const d=Math.sqrt(d2)||0.001;
        const push=PLAYER_R-d;
        ent.x += dx/d*push; ent.y += dy/d*push;
      }
    }
  }
}
function nearestPlot(ent){
  let best=null,bd=1e18;
  for(const p of plots){ if(p.claimedBy) continue;
    const d=(p.x-ent.x)**2+(p.y-ent.y)**2;
    if(d<bd){bd=d;best=p;} }
  return best;
}
function stepAI(ent, dt, spd, acc){
  const tgt=nearestPlot(ent);
  if(!tgt){ ent.speed=0; return; }
  let ang=Math.atan2(tgt.y-ent.y, tgt.x-ent.x);
  const probeX=ent.x+Math.cos(ang)*(PLAYER_R+16);
  const probeY=ent.y+Math.sin(ang)*(PLAYER_R+16);
  if(pointSolid(probeX,probeY)){
    // O lado do desvio varia com o tempo, não só com ent.y: encravado, ent.y
    // congela e o computador insistia para sempre no mesmo lado bloqueado.
    ang += (Math.sin(ent.y*0.01 + performance.now()*0.0016)>0 ? 0.9 : -0.9);
  }
  ent.ang=ang;
  if(acc>0){                       // rampa: leva tempo a chegar ao topo
    if(!(ent.speed>=0)) ent.speed=0;
    ent.speed = ent.speed<spd ? Math.min(spd, ent.speed+acc*dt)
                              : Math.max(spd, ent.speed-acc*1.6*dt);
  } else ent.speed=spd;
  const px=ent.x, py=ent.y;
  ent.x+=Math.cos(ang)*ent.speed*dt;
  ent.y+=Math.sin(ang)*ent.speed*dt;
  collideSlide(ent);
  // encontrão contra um prédio custa balanço: tem de voltar a acelerar
  if(acc>0 && Math.hypot(ent.x-px, ent.y-py) < ent.speed*dt*0.4) ent.speed*=0.5;
}
function pointSolid(x,y){
  if(x<RIVER_W+6||x>WORLD_W-6) return true;
  const row=Math.floor(y/ROW_H);
  for(let r=row-1;r<=row+1;r++){ if(r<0)continue;
    for(let c=0;c<COLS;c++){ const f=cells.get(r+','+c);
      if(isSolid(f)&&x>f.x-f.w/2&&x<f.x+f.w/2&&y>f.y-f.h/2&&y<f.y+f.h/2) return true; } }
  return false;
}

// ---------- particles ----------
const particles=[];
function emit(p){ particles.push(p); }
function emitScreen(p){ p.screen=true; particles.push(p); }
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.vy+=(p.g||0)*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    if(p.screen) continue;
    ctx.globalAlpha=clamp(p.life*1.5,0,1);
    ctx.fillStyle=p.col;
    if(p.rect){ ctx.save(); ctx.translate(sx(p.x),w2s(p.y)); ctx.rotate(p.life*3); ctx.fillRect(-p.r,-p.r*0.6,p.r*2,p.r*1.2); ctx.restore(); }
    else { ctx.beginPath(); ctx.arc(sx(p.x), w2s(p.y), p.r,0,TAU); ctx.fill(); }
  }
  ctx.globalAlpha=1;
}
function drawScreenParticles(){
  for(const p of particles){ if(!p.screen) continue;
    ctx.globalAlpha=clamp(p.life,0,1); ctx.fillStyle=p.col;
    if(p.rect){ ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.life*4); ctx.fillRect(-p.r,-p.r*0.6,p.r*2,p.r*1.2); ctx.restore(); }
    else { ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,TAU); ctx.fill(); } }
  ctx.globalAlpha=1;
}

// ---------- áudio / música (chiptune procedural, WebAudio) ----------
let audio=null, musicGain=null, musicOn=true, musicOK=false, musicNextT=0, musicStep=0;
const A_MEL =[69,72,76,72, 74,77,74,72, 71,74,79,74, 72,69,67,69];
const A_BASS=[45, 0,45, 0, 50, 0,50, 0, 43, 0,43, 0, 45, 0,52, 0];
// tema "estrela" frenético (Moedas no unicórnio): corridas rápidas + baixo aos saltos
const S_MEL =[76,79,83,88, 86,83,79,76, 78,81,85,90, 88,85,81,78];
const S_BASS=[40,52,40,52, 45,57,45,57, 41,53,41,53, 43,55,43,55];
function nFreq(n){ return n? 440*Math.pow(2,(n-69)/12) : 0; }
function initAudio(){
  if(audio){ if(audio.state==='suspended') audio.resume(); return; }
  try{ audio=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ audio=null; return; }
  musicGain=audio.createGain(); musicGain.gain.value=musicOn?0.16:0.0001; musicGain.connect(audio.destination);
  musicNextT=audio.currentTime+0.12; musicStep=0; musicOK=true;
}
function aNote(freq,t,dur,type,vol){
  if(!freq||!audio) return;
  const o=audio.createOscillator(), g=audio.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
  o.connect(g); g.connect(musicGain); o.start(t); o.stop(t+dur+0.03);
}
function updateMusic(){
  if(!musicOK||audio.state==='suspended') return;
  const fren = moedasUnicorn && state!=='menu';   // Moedas no unicórnio → tema frenético
  const step = fren? 0.086 : 0.16;
  while(musicNextT < audio.currentTime+0.2){
    if(fren){
      const m=S_MEL[musicStep%S_MEL.length], b=S_BASS[musicStep%S_BASS.length];
      aNote(nFreq(m),musicNextT,step*0.85,'square',0.15);
      aNote(nFreq(b),musicNextT,step*1.1,'square',0.14);     // baixo em contínuo, sem pausas
      aNote(nFreq(m+12),musicNextT,step*0.4,'square',0.05);  // brilho uma oitava acima
    } else {
      const m=A_MEL[musicStep%A_MEL.length], b=A_BASS[musicStep%A_BASS.length];
      aNote(nFreq(m),musicNextT,step*0.9,'square',0.14);
      aNote(nFreq(b),musicNextT,step*1.7,'triangle',0.16);
      if(musicStep%4===2) aNote(nFreq(m?m+12:0),musicNextT,step*0.5,'square',0.05);
    }
    musicNextT+=step; musicStep++;
  }
}
function setMusic(on){ musicOn=on; if(musicGain) musicGain.gain.setTargetAtTime(on?0.16:0.0001, audio.currentTime, 0.04); }

  if(WORLD_W < W) camX = (WORLD_W - W)/2;
  drawRiver();

  const rowStart=Math.max(0,Math.floor(botWorld/ROW_H)-1);

  ensureRows(rowEnd+2);

  const cityLeft=RIVER_W-camX;
  const asg=ctx.createLinearGradient(cityLeft,0,cityLeft+80,0);
  asg.addColorStop(0,'#585c62'); asg.addColorStop(1,'#6b6f74');
  ctx.fillStyle=asg; ctx.fillRect(cityLeft,0,(WORLD_W-RIVER_W),H);

  if(!asphaltPat){
    const nc=document.createElement('canvas'); nc.width=64; nc.height=64;
    const ng=nc.getContext('2d'); const NR=mulberry32(77);
    for(let i=0;i<160;i++){ ng.fillStyle=NR()<0.5?'rgba(0,0,0,0.08)':'rgba(255,255,255,0.05)';
      ng.fillRect(NR()*64,NR()*64,1.6,1.6); }

  }

  ctx.fillStyle=asphaltPat;
  ctx.fillRect(cityLeft+(camX%64)-64,-70,(WORLD_W-RIVER_W)+128,H+140);
  ctx.restore();
  // vertical lane dashes
  ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=2.5; ctx.setLineDash([15,17]);
  for(let c=0;c<=COLS;c++){
    const sxp=(colX(c)-STREET/2)-camX;
    ctx.beginPath(); ctx.moveTo(sxp,0); ctx.lineTo(sxp,H); ctx.stroke();
  }
  // horizontal lane dashes
  for(let row=rowStart; row<=rowEnd+1; row++){

function drawBridge(rx,by,rw){
  ctx.save();
  const RED='#cf4a35', DRED='#8f2a1c';
  // shadow on water
  ctx.fillStyle='rgba(10,20,40,.3)'; ctx.fillRect(rx,by+14,rw+36,14);

  ctx.strokeStyle=DRED; ctx.lineWidth=2; ctx.strokeRect(rx-4,by-7,rw+42,15);
  ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=1.5; ctx.setLineDash([7,7]);
  ctx.beginPath(); ctx.moveTo(rx-4,by); ctx.lineTo(rx+rw+38,by); ctx.stroke(); ctx.setLineDash([]);
  // truss under deck
  ctx.strokeStyle=DRED; ctx.lineWidth=1.5;
  for(let x=rx-2;x<rx+rw+36;x+=9){
    ctx.beginPath(); ctx.moveTo(x,by+8); ctx.lineTo(x+5,by+13); ctx.stroke(); }
  // towers with X bracing
  for(const tx of [rx+rw*0.30, rx+rw*0.74]){
    ctx.strokeStyle=RED; ctx.lineWidth=7;
    ctx.beginPath(); ctx.moveTo(tx-8,by+22); ctx.lineTo(tx-8,by-76); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx+8,by+22); ctx.lineTo(tx+8,by-76); ctx.stroke();
    ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(tx-10,by-72); ctx.lineTo(tx+10,by-72); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx-10,by-48); ctx.lineTo(tx+10,by-48); ctx.stroke();
    ctx.strokeStyle=DRED; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(tx-8,by-48); ctx.lineTo(tx+8,by-24); ctx.moveTo(tx+8,by-48); ctx.lineTo(tx-8,by-24); ctx.stroke();
    // beacon
    ctx.fillStyle='#ffd23f'; ctx.beginPath(); ctx.arc(tx,by-78,2.5,0,TAU); ctx.fill();
  }
  // main cables + hangers
  ctx.strokeStyle=DRED; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(rx-4,by-10);
  ctx.quadraticCurveTo(rx+rw*0.30,by-80,rx+rw*0.52,by-28);
  ctx.quadraticCurveTo(rx+rw*0.74,by-80,rx+rw+38,by-10); ctx.stroke();
  ctx.lineWidth=1.2;
  for(let x=rx+4;x<rx+rw+34;x+=10){
    // approximate cable y via two quadratic segments
    let cy2;
    const m=rx+rw*0.52;
    if(x<m){ const u=(x-(rx-4))/(m-(rx-4)); cy2=(1-u)*(1-u)*(by-10)+2*(1-u)*u*(by-80)+u*u*(by-28); }
    else { const u=(x-m)/((rx+rw+38)-m); cy2=(1-u)*(1-u)*(by-28)+2*(1-u)*u*(by-80)+u*u*(by-10); }
    ctx.beginPath(); ctx.moveTo(x,cy2); ctx.lineTo(x,by-7); ctx.stroke();
  }
  // tiny cars on deck
  const t=performance.now()*0.001;
  for(let i=0;i<3;i++){
    const cxp=rx+((t*40+i*60)%(rw+40))-4;
    ctx.fillStyle=['#e0d05a','#5a8fe0','#e05a5a'][i];
    ctx.fillRect(cxp,by-5+ (i%2)*7,8,4);

  ctx.restore();
}
function drawFeature(f){
  const x=sx(f.x), y=w2s(f.y);
  if(x<-CELL_W||x>W+CELL_W||y<-CELL_H||y>H+CELL_H) return;
  let tile=null;
  switch(f.type){
    case 'building': tile=TILE.bld[f.seed%TILE.bld.length]; break;
    case 'garden': tile=TILE.garden; break;
    case 'gas': tile=TILE.gas; break;
    case 'gira': tile=f.broken?TILE.giraBad:TILE.gira; break;
    case 'landmark': tile=TILE.lm[f.name]; break;
    case 'plot':
      if(f.claimedBy==='moedas') tile= f.buildType==='condo'? TILE.plotCondo : TILE.plotLux;
      else if(f.claimedBy==='lisboetas') tile=TILE.plotHab;
      else { drawPlotOpen(f,x,y); return; }
      break;
  }
  if(tile){ const sm=ctx.imageSmoothingEnabled; if(tile.__pix) ctx.imageSmoothingEnabled=false;
    ctx.drawImage(tile, x-CELL_W/2, y-CELL_H/2, CELL_W, CELL_H+EXT); ctx.imageSmoothingEnabled=sm; }
}

function drawMoedasEnt(m){
  const t=performance.now()*0.001;
  const goingUp = Math.sin(m.ang)>0.5;      // rumo maioritariamente a subir
  const lean = Math.cos(m.ang)*0.32;        // inclinação lateral no frame vertical
  const f=faceOf(m);
  const tilt=-Math.sin(m.ang)*0.38;
  const rx=Math.cos(m.ang), ry=Math.sin(m.ang);   // rumo (mundo) p/ traseira
  if(m.unicorn){
    for(let i=0;i<5;i++){
      emit({x:m.x-rx*(14+i*7)+rand(-3,3), y:m.y-ry*(14+i*7)+rand(-3,3),
        vx:0,vy:0,life:0.45,g:0,r:4.5,col:`hsl(${(performance.now()*0.35+i*45)%360},90%,58%)`});
    }
    ctx.save(); ctx.translate(sx(m.x), w2s(m.y));
    if(goingUp){ ctx.scale(0.5,0.5); ctx.rotate(lean); drawUniRear(t); }
    else { ctx.scale(f*0.5,0.5); ctx.rotate(tilt); drawUniSide(0,0,1,t); }
    ctx.restore();
  } else {
    // MUITO fumo do escape (sai pela traseira, no rumo oposto)
    for(let i=0;i<3;i++){
      const gr=(80+rand(0,34))|0;
      emit({x:m.x-rx*30+rand(-6,6), y:m.y-ry*30+rand(-6,6), vx:-rx*rand(12,36)+rand(-6,6), vy:-ry*rand(12,36)+rand(-6,6),
        life:rand(1.0,1.7), g:0, r:rand(5,11), col:`rgba(${gr},${gr},${gr+6},0.5)`});
    }
    if(Math.random()<0.35)
      emit({x:m.x-rx*30, y:m.y-ry*30, vx:-rx*rand(8,20), vy:-ry*rand(8,20),
        life:1.9, g:0, r:rand(9,15), col:'rgba(58,58,64,0.45)'});
    ctx.save(); ctx.translate(sx(m.x), w2s(m.y));
    if(goingUp){ ctx.scale(0.45,0.45); ctx.rotate(lean); drawCarRear(); }
    else { ctx.scale(f*0.45,0.45); ctx.rotate(tilt); drawCarSide(0,0,1,false); }
    ctx.restore();
  }
}
const BIKE_FRQ=[1.9,2.3,1.7,2.6,2.1], BIKE_PH=[0,1.7,3.1,4.4,0.9];
function drawLisboetasEnt(l){
  const t=performance.now()*0.001;
  const goingUp = Math.sin(l.ang)>0.5;
  const lean = Math.cos(l.ang)*0.28;
  const f=faceOf(l);
  const tilt=-Math.sin(l.ang)*0.34;
  const bx=sx(l.x), by=w2s(l.y);
  const offs=[[0,-13],[-26,-5],[26,-5],[-13,7],[13,7]];   // líder à frente/cima
  ctx.save(); ctx.translate(bx,by);
  if(goingUp){ ctx.rotate(lean); } else { ctx.scale(f,1); ctx.rotate(tilt); }
  for(let i=0;i<l.riders;i++){
    // cada ciclista oscila com fase/frequência próprias — grupo orgânico
    const ox=offs[i][0]+Math.sin(t*BIKE_FRQ[i]+BIKE_PH[i])*4.5;
    const oy=offs[i][1]+Math.cos(t*BIKE_FRQ[i]*0.8+BIKE_PH[i]*1.3)*3;
    const wob=Math.sin(t*BIKE_FRQ[i]*2.6+BIKE_PH[i])*0.06;
    ctx.save(); ctx.translate(ox,oy); ctx.rotate(wob);
    if(goingUp) drawBikeRear(0,0,0.62,i); else drawBikeSide(0,0,0.62,false,i);
    ctx.restore();
  }
  ctx.restore();
}

function meter(x,y,w,h,v,col,lab){
  ctx.fillStyle='#14161e'; rr(ctx,x-2,y-2,w+4,h+4,8); ctx.fill();
  ctx.strokeStyle='rgba(240,220,160,.5)'; ctx.lineWidth=1.5; rr(ctx,x-2,y-2,w+4,h+4,8); ctx.stroke();
  ctx.fillStyle='#26282f'; rr(ctx,x,y,w,h,6); ctx.fill();
  const grd=ctx.createLinearGradient(x,y,x,y+h);
  grd.addColorStop(0,col); grd.addColorStop(1,'rgba(0,0,0,.35)');
  ctx.save(); rr(ctx,x,y,w*clamp(v,0,1),h,6); ctx.clip();
  ctx.fillStyle=col; ctx.fillRect(x,y,w,h);
  ctx.fillStyle='rgba(255,255,255,.28)'; ctx.fillRect(x,y,w,h/2.4);
  ctx.restore();
  // segment notches
  ctx.strokeStyle='rgba(10,12,18,.55)'; ctx.lineWidth=2;
  for(let i=1;i<10;i++){ ctx.beginPath(); ctx.moveTo(x+w*i/10,y); ctx.lineTo(x+w*i/10,y+h); ctx.stroke(); }
  ctx.fillStyle='#f4ecd7'; ctx.font='900 10px "Arial Black", Impact, sans-serif'; ctx.textAlign='left';
  ctx.fillText(lab,x+1,y-5);
}

let menuBG=null, menuBGKey='';
function buildMenuBG(){
  const key=W+'x'+H;
  if(menuBG && menuBGKey===key) return;
  menuBGKey=key;
  menuBG=document.createElement('canvas'); menuBG.width=W; menuBG.height=H;
  const g=menuBG.getContext('2d');
  g.fillStyle='#12101e'; g.fillRect(0,0,W,H);
  // diamond checker, green side left / red side right, split on a slight diagonal
  const s=58, iso=Math.SQRT1_2;
  const ext=Math.max(W,H)*0.9;
  for(let ix=-ext; ix<ext; ix+=s){
    for(let iy=-ext; iy<ext; iy+=s){
      const odd=(((ix+iy)/s)|0)%2===0;
      const cx2=ix+s/2, cy2=iy+s/2;
      const px=W/2 + (cx2-cy2)*iso;
      const py=H/2 + (cx2+cy2)*iso;
      const left = px < W/2 + (py-H/2)*0.22;
      g.fillStyle = left ? (odd?'#14381f':'#0d2916') : (odd?'#571523':'#3f0f19');
      g.save(); g.translate(px,py); g.rotate(Math.PI/4);
      g.fillRect(-s/2-0.5,-s/2-0.5,s+1,s+1);
      g.restore();
    }
  }
  // diagonal split flash
  g.save(); g.translate(W/2,H/2); g.rotate(Math.atan2(1,0.22)-Math.PI/2);
  const fg2=g.createLinearGradient(-26,0,26,0);
  fg2.addColorStop(0,'rgba(255,255,255,0)'); fg2.addColorStop(0.5,'rgba(255,240,200,.5)'); fg2.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=fg2; g.fillRect(-26,-Math.max(W,H),52,Math.max(W,H)*2);
  g.restore();
  // vignette + center glow
  const vg=g.createRadialGradient(W/2,H*0.42,80,W/2,H/2,Math.max(W,H)*0.75);
  vg.addColorStop(0,'rgba(255,230,170,.12)'); vg.addColorStop(0.4,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.66)');
  g.fillStyle=vg; g.fillRect(0,0,W,H);
}
function fgText(txt,x,y,size,stops,rot){

function drawBikeSide(x,y,s,slump,v,opts){

      ctx.strokeStyle='#8a774f'; ctx.lineWidth=1.5; rr(ctx,-11,-9,22,14,2); ctx.stroke();

      ctx.beginPath(); ctx.moveTo(-7,-4); ctx.lineTo(7,-4); ctx.moveTo(-7,0); ctx.lineTo(5,0); ctx.stroke();

function wrap(txt,maxw,size){
  ctx.font='900 '+size+'px "Arial Black", Impact, sans-serif';
  const words=txt.split(' '); const lines=[]; let cur='';
  for(const w of words){ const tst=cur?cur+' '+w:w;
    if(ctx.measureText(tst).width>maxw){ lines.push(cur); cur=w; } else cur=tst; }
  if(cur)lines.push(cur); return lines;
}

function drawCut(){

function cutGasTruck(p){
  const T=cut.t;

  if(T>5.2){
    const tx=lerp(W+280, cx+210, clamp((T-5.2)/1.4,0,1));
    drawTruckSide(tx,cy-6,1.5,T);
    if(T>6.8){

      ctx.beginPath(); ctx.moveTo(tx-140,cy); ctx.quadraticCurveTo(cx-20,cy+70,carX+52,cy+16); ctx.stroke();
      ctx.strokeStyle='#e04338'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(tx-140,cy); ctx.quadraticCurveTo(cx-20,cy+70,carX+52,cy+16); ctx.stroke();
      // combustível a correr na mangueira
      for(let k=0;k<3;k++){ const bb=(T*1.6+k*0.33)%1;

        ctx.beginPath(); ctx.arc(lerp(tx-140,carX+52,bb), cy+Math.sin(bb*Math.PI)*56, 5,0,TAU); ctx.fill(); }
    }
    // ---- balão de fala (fase D) ----
    if(T>7.2){
      const bx=tx-50, byy=cy-150;
      ctx.fillStyle='#fff'; rr(ctx,bx-175,byy-42,350,74,16); ctx.fill();
      ctx.beginPath(); ctx.moveTo(bx-20,byy+32); ctx.lineTo(bx,byy+58); ctx.lineTo(bx+16,byy+32); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#26221f'; ctx.lineWidth=2.5; rr(ctx,bx-175,byy-42,350,74,16); ctx.stroke();
      ctx.fillStyle='#1a1a24'; ctx.textAlign='center';

// ================= GAME LOGIC =================
let interactCd=0;
let pendingGameOver=false, pendingUnicorn=false, pendingEndCheck=false;
function updatePlay(dt){
  const spd = playerBaseSpeed();
  let mv=false, vx=0, vy=0;
  if(keys.ArrowUp||touchDir.u){vy+=1;} if(keys.ArrowDown||touchDir.d){vy-=1;}
  if(keys.ArrowLeft||touchDir.l){vx-=1;} if(keys.ArrowRight||touchDir.r){vx+=1;}
  if(vx||vy){
    const l=Math.hypot(vx,vy); vx/=l; vy/=l;
    player.ang=Math.atan2(vy,vx);
    player.x+=vx*spd*dt; player.y+=vy*spd*dt;
    collideSlide(player);
    mv=true;
  }
  if(mv) drainResource(dt);
  const opp = (playerSide==='moedas')? lisboetas : moedas;
  if(aiIdle>0){ aiIdle=Math.max(0,aiIdle-dt); }   // computador parado (reação/apanhar)
  else { stepAI(opp, dt, oppSpeed(), oppAccel()); }
  const targetCam = player.y - H*0.35;
  camY = lerp(camY, targetCam, 1-Math.pow(0.001,dt));
  if(camY<-40) camY=-40;
  interactCd=Math.max(0,interactCd-dt);
  checkStations(player);
  checkPlots(player, playerSide);
  checkPlots(opp, playerSide==='moedas'?'lisboetas':'moedas');
  ensureRows(Math.floor((camY+H)/ROW_H)+3);
  // quem não reclama um terreno antes de ele ficar ~2 ecrãs atrás perde-o para o adversário
  // (garante que o jogo termina sempre e dá urgência à corrida)
  for(const p of plots) if(!p.claimedBy && camY - p.y > 1.8*H) resolveAbandonedPlot(p);
  updateParticles(dt);
}
// O unicórnio é claramente mais rápido que o Moedas de carro (245 no
// computador, 210 no jogador), mas fica logo abaixo dos 282 dos Lisboetas:
// uma corrida impecável ainda o bate, e o computador dos Lisboetas com a
// borracha no máximo (277) também o alcança. Dá tensão em vez de derrota certa.
const UNICORN_SPEED = 272;
const LISBOETAS_SPEED = 282;      // Lisboetas com o jogador ao volante
// O unicórnio do computador chega exactamente ao mesmo topo dos Lisboetas, mas
// tem de o construir: arranca forte e perde balanço em cada curva e encontrão,
// por isso na prática corre abaixo disso.
const UNICORN_AI_TOP = LISBOETAS_SPEED;
const UNICORN_AI_ACC = 330;       // px/s² — cerca de 0,9 s dos 0 ao topo
function playerBaseSpeed(){
  if(player.kind==='moedas'){ return player.unicorn? UNICORN_SPEED : 210; }
  return LISBOETAS_SPEED;   // Lisboetas um pouco mais rápidos para terem hipótese
}
// ---- borracha: o computador acelera quando fica muito para trás ----
// Sem isto uma boa arrancada mata a corrida — o adversário desaparece atrás
// e os últimos terrenos são um passeio. O bónus entra devagar (curva
// quadrática) para que uma vantagem honesta continue a compensar.
const CATCH_LAG0=0.7;      // ecrãs de atraso tolerados antes de compensar
const CATCH_LAG_SAT=2.6;   // atraso a partir do qual o bónus satura
const CATCH_LAG_BONUS=0.85;// bónus máximo vindo da distância
const CATCH_PLOT_BONUS=0.3;// bónus máximo vindo da desvantagem de terrenos
const CATCH_CEIL=1.35;     // nunca mais que isto vezes a velocidade do jogador
function catchupBoost(){
  const opp = (playerSide==='moedas') ? lisboetas : moedas;
  if(!opp || !player) return 1;
  let boost=1;
  const lag=(player.y-opp.y)/H;                 // atraso em ecrãs
  if(lag>CATCH_LAG0){
    const t=clamp((lag-CATCH_LAG0)/(CATCH_LAG_SAT-CATCH_LAG0),0,1);
    boost += CATCH_LAG_BONUS*t*t;
  }
  const mine   = playerSide==='moedas'? plotsSold  : plotsSaved;
  const theirs = playerSide==='moedas'? plotsSaved : plotsSold;
  if(mine-theirs>1) boost += Math.min((mine-theirs-1)*0.1, CATCH_PLOT_BONUS);
  return boost;
}
function oppSpeed(){
  // Unicórnio do computador: tecto duro igual aos Lisboetas do jogador. Não
  // leva borracha por cima — o próprio unicórnio já é a compensação do Moedas
  // quando vai a perder, e assim nunca chega a ser mais rápido que o jogador.
  if(playerSide==='lisboetas' && moedas.unicorn) return UNICORN_AI_TOP;
  const base = (playerSide==='moedas') ? 150 : 245;
  // o tecto relativo evita teletransportes: recupera terreno, não humilha
  return Math.min(base*catchupBoost(), playerBaseSpeed()*CATCH_CEIL);
}
// Só o unicórnio do computador acelera; o resto mantém a resposta imediata
// que já estava afinada. 0 = sem rampa.
function oppAccel(){
  return (playerSide==='lisboetas' && moedas.unicorn) ? UNICORN_AI_ACC : 0;
}
function drainResource(dt){
  if(player.kind==='moedas'){
    if(player.unicorn) return;
    player.gas -= dt*0.045;
    if(player.gas<=0){ player.gas=0; playCut('gasTruck',10); }
  } else {
    player.battery -= dt*0.075;
    if(player.battery<=0){ player.battery=0; loseRider(); }
  }
}
function loseRider(){
  lisboetas.riders--;
  if(lisboetas.riders<=0){
    lisboetas.riders=0;
    playCut('noBattery',2.8); pendingGameOver=true;
  } else {
    lisboetas.battery=1;
    playCut('noBattery',2.8);
  }
}
function checkStations(ent){
  if(interactCd>0) return;
  const row=Math.floor(ent.y/ROW_H);
  for(let r=row-1;r<=row+1;r++){ if(r<0)continue;
    for(let c=0;c<COLS;c++){ const f=cells.get(r+','+c); if(!f)continue;
      if(Math.abs(f.x-ent.x)<f.w/2+PLAYER_R && Math.abs(f.y-ent.y)<f.h/2+PLAYER_R){
        if(f.type==='gas' && ent.kind==='moedas' && !ent.unicorn && ent.gas<0.99){ ent.gas=1; interactCd=0.5; }
        if(f.type==='gira' && ent.kind==='lisboetas'){
          if(f.broken && !f.used){ f.used=true; interactCd=1; playCut('brokenDock',2.6); }
          else if(!f.broken && ent.battery<0.99){ ent.battery=1; interactCd=0.5; }
        }
      }
    }
  }
}
function checkPlots(ent, side){
  for(const p of plots){ if(p.claimedBy) continue;
    if(Math.abs(p.x-ent.x)<p.w/2 && Math.abs(p.y-ent.y)<p.h/2){
      if(ent.isPlayer){
        if(ent.kind==='moedas' && !ent.unicorn && ent.gas<=0) continue;
        if(ent.kind==='lisboetas' && ent.battery<=0) continue;
      }
      p.claimedBy=side;
      plotsDone++;
      if(side==='moedas'){ p.buildType = Math.random()<0.5? 'condo':'hotel';
        plotsSold++; if(p.buildType==='condo') condosBuilt++; else hotelsBuilt++;
        playCut('moedasWin',2.6,{condo:p.buildType==='condo'}); }
      else { plotsSaved++; playCut('lisboetasWin',2.8);
        if(plotsSaved===5 && !moedasUnicorn){ pendingUnicorn=true; } }
      pendingEndCheck=true;
      return;
    }
  }
}
function afterCut(){
  if(pendingGameOver){ pendingGameOver=false; playCut('end',999); return; }
  if(pendingUnicorn){ pendingUnicorn=false; moedasUnicorn=true; moedas.unicorn=true; playCut('unicorn',15); return; }
  if(pendingEndCheck){ pendingEndCheck=false;
    if(plotsDone>=TOTAL_PLOTS){ playCut('end',999); return; } }
  state='play';
}

// ---------- retro scanline overlay ----------
let scanPat=null;
function scanlines(){
  if(!scanPat){
    const c=document.createElement('canvas'); c.width=2; c.height=3;
    const g=c.getContext('2d');
    g.fillStyle='rgba(10,10,18,0.10)'; g.fillRect(0,2,2,1);
    scanPat=ctx.createPattern(c,'repeat');
  }
  ctx.fillStyle=scanPat; ctx.fillRect(0,0,W,H);
}

// ================= MAIN LOOP =================
let last=performance.now();
function frame(now){
  // dt limitado dos dois lados: em cima contra saltos (separador em segundo
  // plano), em baixo contra relógios não monótonos, que poriam cut.t negativo
  let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05; else if(dt<0)dt=0;
  updateMusic();
  lofiBegin();   // cena inteira para a grelha de pixels; UI/texto via crisp()
  if(state==='orient'){
    drawOrient();
    if(mouse.clicked && inObrigadoBtn(mouse.x,mouse.y)){ initAudio(); state='menu'; }
  } else if(state==='menu'){
    drawMenu();
    if(mouse.clicked){
      for(const b of menuBtns){ if(mouse.x>b.x&&mouse.x<b.x+b.w&&mouse.y>b.y&&mouse.y<b.y+b.h){
        if(b.act==='music'){ initAudio(); setMusic(!musicOn); }
        else if(b.side){ startGame(b.side); }
        break;
      } }
    }
  } else if(state==='countdown'){
    countdownT-=dt;
    drawCountdown();
    drawPauseBtn();
    if(mouse.clicked && inPauseBtn(mouse.x,mouse.y)){ pausePrev='countdown'; state='pause'; }
    else if(countdownT<=0){ state='play'; aiIdle=0.5; }   // meio segundo de vantagem para reagir
  } else if(state==='pause'){
    drawPause();
    if(mouse.clicked){
      for(const b of pauseBtns){ if(mouse.x>b.x&&mouse.x<b.x+b.w&&mouse.y>b.y&&mouse.y<b.y+b.h){
        if(b.act==='continue'){ state=pausePrev||'play'; }
        else if(b.act==='music'){ setMusic(!musicOn); }
        else if(b.act==='menu'){ particles.length=0; resetToMenu(); }
        break;
      } }
    }
  } else if(state==='play'){
    // botão de pausa tátil
    if(mouse.clicked && inPauseBtn(mouse.x,mouse.y)){ pausePrev='play'; state='pause'; clearJoy(); }
    else {
      updatePlay(dt);
      if(state==='play'||state==='cut'){ drawScene(); drawTouchUI(); }
    }
  } else if(state==='cut'){
    cut.t+=dt;
    updateParticles(dt);
    drawCut();
    drawParticles(); drawScreenParticles();
    const done = cut.type==='end'? false : cut.t>=cut.dur;
    if(cut.type!=='end' && (done || keys[' '] || mouse.clicked)){ keys[' ']=false;   // tap para avançar
      const ended=cut.type;
      if(ended==='gasTruck'){ moedas.gas=1; }
      cut=null; afterCut();
      // depois de construir, congelar o computador 1s só se foi ELE a construir (não o jogador)
      if(state==='play' && (ended==='moedasWin'||ended==='lisboetasWin'||ended==='unicorn')){
        const winnerSide = (ended==='moedasWin') ? 'moedas' : 'lisboetas';   // unicórnio segue um terreno dos Lisboetas
        if(winnerSide!==playerSide) aiIdle=Math.max(aiIdle,1.0);
      }
    }
    if(cut && cut.type==='end' && (mouse.clicked || keys[' '])){ keys[' ']=false; particles.length=0; resetToMenu(); }
  }
  lofiEnd();     // amplia a grelha (nearest-neighbour) e corre a fila crisp
  scanlines();
  mouse.clicked=false;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
// PWA: regista o service worker (só em http/https; ignora file://)
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
}
</script>
